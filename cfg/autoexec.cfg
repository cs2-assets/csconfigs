sensitivity 2.1

cl_crosshairstyle 4
cl_crosshairsize 3
cl_crosshairthickness 0.7
cl_crosshair_outlinethickness 1
cl_crosshairgap -3
cl_crosshairdot 0

r_fullscreen_gamma 2.5

cl_crosshaircolor 5
cl_crosshaircolor_r 255
cl_crosshaircolor_g 255
cl_crosshaircolor_b 255

viewmodel_offset_x -1
viewmodel_offset_y 0.5
viewmodel_offset_z -1.5

cl_radar_rotate 0
cl_radar_scale 1.5
cl_radar_always_centered false
cl_hud_radar_scale 1.2

fps_max 0
vrpof_off
lv_off
cl_interp 0.015625
cl_interp_ratio 1
cl_hide_avatar_images 1

bind "MOUSE5" "slot10"      // Molotov
bind "MOUSE4" "slot8"       // Smoke
bind "MOUSE3" "player_ping" // Map ping / info marker

bind "MWHEELUP" "slot7"     // Flashbang
bind "MWHEELDOWN" "+jump"   // Jump

bind "4" "slot6"            // HE Grenade
bind "x" "slot5"            // C4 / Bomb


bind "\" "toggleconsole"

bot_aim body // "body" | "head" | "mixed"
bot_nades normal // "off" | "normal"
